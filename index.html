<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chess Game</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css"/>
<style>
  body { background:#222; color:#fff; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; }
  h1 { margin-top:20px; }
  #board { margin:20px; }
  button { padding:10px 15px; font-size:16px; margin:5px; cursor:pointer; }
  #startScreen { display:flex; flex-direction:column; align-items:center; margin-top:50px; }
  #gameScreen { display:none; flex-direction:column; align-items:center; }
</style>
</head>
<body>

<div id="startScreen">
  <h1>Chess Game</h1>
  <button id="twoPlayerBtn">2 Player</button>
  <button id="vsAIBtn">Play vs AI</button>
</div>

<div id="gameScreen">
  <div id="board" style="width: 480px"></div>
  <button id="restartBtn">Restart Game</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/1.0.0/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script>
let game = new Chess();
let board = null;
let vsAI = false;
let playerColor = 'w';
let aiColor = 'b';
let aiThinking = false;

// Handle player moves
function handleMove(source, target) {
  if (aiThinking) return 'snapback';
  const move = game.move({ from: source, to: target, promotion: 'q' });
  if (move === null) return 'snapback';

  if (vsAI && game.turn() === aiColor) {
    aiThinking = true;
    setTimeout(() => { makeAIMove(); aiThinking = false; }, 300);
  }
}

// AI move (simple 2-ply strategy)
function makeAIMove() {
  if (game.game_over()) return;

  const moves = game.moves();
  if (moves.length === 0) return;

  let bestMove = null;
  let bestScore = -Infinity;

  for (let m of moves) {
    game.move(m);
    let score = -evaluateMinimax(2, -Infinity, Infinity, false);
    game.undo();
    if (score > bestScore) { bestScore = score; bestMove = m; }
  }

  game.move(bestMove);
  board.position(game.fen());
}

// Evaluate board (material only)
function evaluateBoard() {
  const values = { p:1, n:3, b:3, r:5, q:9, k:0 };
  let score = 0;
  for (let row of game.board()) {
    for (let piece of row) {
      if (piece) {
        let val = values[piece.type];
        score += (piece.color === aiColor ? val : -val);
      }
    }
  }
  return score;
}

// Minimax with alpha-beta pruning
function evaluateMinimax(depth, alpha, beta, isMaximizing) {
  if (depth === 0 || game.game_over()) return evaluateBoard();
  const moves = game.moves();
  if (isMaximizing) {
    let maxEval = -Infinity;
    for (let m of moves) {
      game.move(m);
      let evalScore = evaluateMinimax(depth-1, alpha, beta, false);
      game.undo();
      maxEval = Math.max(maxEval, evalScore);
      alpha = Math.max(alpha, evalScore);
      if (beta <= alpha) break;
    }
    return maxEval;
  } else {
    let minEval = Infinity;
    for (let m of moves) {
      game.move(m);
      let evalScore = evaluateMinimax(depth-1, alpha, beta, true);
      game.undo();
      minEval = Math.min(minEval, evalScore);
      beta = Math.min(beta, evalScore);
      if (beta <= alpha) break;
    }
    return minEval;
  }
}

// Start screen buttons
document.getElementById('twoPlayerBtn').addEventListener('click', () => {
  vsAI = false;
  playerColor = 'w';
  startGame();
});

document.getElementById('vsAIBtn').addEventListener('click', () => {
  vsAI = true;
  if (Math.random() < 0.5) { playerColor = 'w'; aiColor = 'b'; } 
  else { playerColor = 'b'; aiColor = 'w'; }
  startGame();
});

// Restart game
document.getElementById('restartBtn').addEventListener('click', () => {
  game.reset();
  board.start();
  if (vsAI && aiColor === 'w') {
    aiThinking = true;
    setTimeout(() => { makeAIMove(); aiThinking = false; }, 300);
  }
});

// Start the game
function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'flex';
  
  game.reset();

  // Destroy old board if exists
  if (board) board.destroy();

  // Initialize new board
  board = Chessboard('board', {
    draggable: true,
    position: 'start',
    onDrop: handleMove,
    orientation: playerColor === 'w' ? 'white' : 'black'
  });

  // AI moves first if it’s white
  if (vsAI && aiColor === 'w') {
    aiThinking = true;
    setTimeout(() => { makeAIMove(); aiThinking = false; }, 300);
  }
}
</script>
</body>
</html>
