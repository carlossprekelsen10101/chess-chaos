<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chess vs AI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css"/>
  <style>
    body {
      background: #222;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { margin-top: 20px; }
    #board { margin: 20px; }
    button { padding: 10px 15px; font-size: 16px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <h1>Chess vs AI</h1>
  <div id="board" style="width: 400px"></div>
  <button id="restartBtn">Restart Game</button>

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/1.0.0/chess.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
  <script>
    const game = new Chess(); // chess.js game
    let board = null;

    // Initialize board
    function initBoard() {
      board = Chessboard('board', {
        draggable: true,
        position: 'start',
        onDrop: handleMove
      });
    }

    // Handle player move
    function handleMove(source, target) {
      const move = game.move({
        from: source,
        to: target,
        promotion: 'q'
      });
      if (move === null) return 'snapback'; // illegal move
      window.setTimeout(makeAIMove, 300);
    }

    // AI move
    function makeAIMove() {
      if (game.game_over()) return;

      // Simple intermediate AI: pick the best move using random evaluation
      const moves = game.moves();
      if (moves.length === 0) return;

      let bestMove = null;
      let bestScore = -Infinity;

      moves.forEach(m => {
        game.move(m);
        const score = evaluateBoard();
        if (score > bestScore) {
          bestScore = score;
          bestMove = m;
        }
        game.undo();
      });

      game.move(bestMove);
      board.position(game.fen());
    }

    // Simple board evaluation (material only)
    function evaluateBoard() {
      const values = {p:1, n:3, b:3, r:5, q:9, k:0};
      let score = 0;
      const boardArray = game.board();
      for (let row of boardArray) {
        for (let piece of row) {
          if (piece) {
            const val = values[piece.type];
            score += piece.color === 'w' ? val : -val;
          }
        }
      }
      return score;
    }

    // Restart button
    document.getElementById('restartBtn').addEventListener('click', () => {
      game.reset();
      board.start();
    });

    // Initialize everything
    initBoard();
  </script>
</body>
</html>
